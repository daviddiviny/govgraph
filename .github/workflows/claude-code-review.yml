name: Claude Code Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - ready_for_review
      - reopened
    paths-ignore:
      - "**/*.md"
      - "docs/**"

concurrency:
  group: claude-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request against the standards in AGENTS.md.

            Focus on:
            - correctness and likely regressions
            - missing validation, error handling, or authorization checks
            - maintainability and consistency with the repository's house stack
            - missing or weak tests for changed behavior
            - performance or data-access problems introduced by the change

            Keep the review high signal:
            - comment only when you find a concrete, actionable issue
            - prefer inline comments for file-specific findings
            - use mcp__github_inline_comment__create_inline_comment with confirmed: true for inline review comments
            - use a single top-level comment only for cross-cutting concerns or when no actionable issues remain
            - do not restate the PR description or praise unchanged code
            - do not suggest new frameworks or parallel patterns that conflict with AGENTS.md

            The PR branch is already checked out in the working directory.
            Only post GitHub comments. Do not return the review as plain action output.
          claude_args: |
            --model claude-opus-4-6
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
